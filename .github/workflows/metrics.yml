name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.terminal.svg

          template: terminal
          base: header, metadata

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_traffic: yes
